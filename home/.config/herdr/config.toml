onboarding = false
[keys]
prefix = "ctrl+b"
detach = "prefix+d"  # tmux-style detach (herdr's default is prefix+q)
focus_pane_left  = "prefix+h"
focus_pane_down  = "prefix+j"
focus_pane_up    = "prefix+k"
focus_pane_right = "prefix+l"
split_horizontal = "prefix+double_quote"
split_vertical    = "prefix+percent"
new_tab   = "prefix+c"
close_tab = "prefix+ampersand"
workspace_picker = "prefix+w"
goto             = "prefix+g"
copy_mode  = "prefix+["  # tmux-style prefix+[ enter copy mode; copy-mode's own internal keys (v/space select, y/Enter copy, q/Esc cancel) aren't configurable
last_pane  = "prefix+semicolon"  # tmux-style prefix+; jump back to the last active pane
rename_tab = "prefix+comma"      # tmux-style prefix+, rename window
cycle_pane_next = "prefix+o"     # tmux-style prefix+o cycle to next pane
open_notification_target = "prefix+shift+o"  # moved off herdr's default prefix+o, which cycle_pane_next now owns
previous_workspace = "prefix+("  # tmux-style prefix+( previous session
next_workspace     = "prefix+)"  # tmux-style prefix+) next session
switch_workspace = "prefix+shift+1..9"  # indexed workspace jump, mirrors switch_tab prefix+1..9
focus_agent      = "prefix+alt+1..9"    # focus agent sidebar rows directly

[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
width = "80%"
height = "80%"

[ui]
# Agents panel order: explicit choice of "spaces" (grouped by space, the default) over "priority".
agent_panel_sort = "spaces"

show_agent_labels_on_pane_borders = true
[ui.toast]
delivery = "terminal"
